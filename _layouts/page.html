---
layout: default
---
<div class="max-w-4xl mx-auto px-6 py-16">
    <header class="mb-10">
        <h1 class="text-3xl md:text-4xl font-bold text-stone-900 mb-4 serif leading-tight">{{ page.title }}</h1>
        {% if page.description %}
        <p class="text-lg text-stone-500 leading-relaxed">{{ page.description }}</p>
        {% endif %}
        <div class="mt-6 border-b border-stone-200"></div>
    </header>
    <div class="content">
        {{ content }}
    </div>
</div>
